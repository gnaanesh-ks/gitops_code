apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-website-deployment
  labels:
    app: my-website
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-website
  template:
    metadata:
      labels:
        app: my-website
    spec:
      containers:
        - name: my-website
          image: 929170595649.dkr.ecr.eu-north-1.amazonaws.com/hello-world:v1 
          ports:
            - containerPort: 80
